# Conserve le protocole d'origine transmis par Traefik (https).
# Sans ça, $scheme vaudrait "http" (lien interne Traefik→nginx) et le backend
# refuserait de poser le cookie de session secure → OAuth Strava cassé en prod.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy vers le backend : tout reste en même origine (cookies de session OK)
    # "backend" = nom du service dans docker-compose
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /auth/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Nécessaire pour React Router : redirige toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
