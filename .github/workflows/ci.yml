name: CI / CD
# déclencheur de test CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # CI — Backend (NestJS)
  # ─────────────────────────────────────────
  backend:
    name: Backend — lint · typecheck · build · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec eslint "{src,apps,libs,test}/**/*.ts"

      - name: Vérification des types
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test

  # ─────────────────────────────────────────
  # CI — Frontend (Vite + React)
  # ─────────────────────────────────────────
  frontend:
    name: Frontend — typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Vérification des types
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

  # ─────────────────────────────────────────
  # Docker — build des images après CI verte
  # ─────────────────────────────────────────
  docker:
    name: Docker — build images
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image backend
        run: docker build -t michelin-backend:latest ./backend

      - name: Build image frontend
        run: docker build -t michelin-frontend:latest ./frontend

  # ─────────────────────────────────────────
  # CD — Deploy sur le serveur (SSH)
  # Déclenché uniquement sur push vers main,
  # et seulement si les images Docker se construisent
  # ─────────────────────────────────────────
  deploy:
    name: Deploy → serveur
    if: github.event_name == 'push'
    needs: [docker]
    runs-on: ubuntu-latest
    continue-on-error: true  # non bloquant tant que les secrets SSH ne sont pas configurés

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main

            echo "── Backend ──"
            cd backend
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart michelin-backend || pm2 start dist/main.js --name michelin-backend

            echo "── Frontend ──"
            cd ../frontend
            pnpm install --frozen-lockfile
            pnpm build
            echo "Build OK — nginx sert frontend/dist/"
