name: CI / CD
# déclencheur de test CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # CI — Backend (NestJS)
  # ─────────────────────────────────────────
  backend:
    name: Backend — lint · typecheck · build · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec eslint "{src,apps,libs,test}/**/*.ts"

      - name: Vérification des types
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test

  # ─────────────────────────────────────────
  # CI — Frontend (Vite + React)
  # ─────────────────────────────────────────
  frontend:
    name: Frontend — typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Vérification des types
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

  # ─────────────────────────────────────────
  # Docker — build & push vers ghcr.io
  # Push uniquement sur main, build seul sur PR
  # ─────────────────────────────────────────
  docker:
    name: Docker — build & push images
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Calcul des noms d'images (lowercase requis par ghcr.io)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/michelin-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/michelin-frontend" >> $GITHUB_ENV

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push image frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # CD — Déclenche le redéploiement Dokploy
  # Uniquement sur push main, après que les images
  # soient poussées sur ghcr.io. Dokploy pull les
  # nouvelles images et redéploie le compose.
  # ─────────────────────────────────────────
  deploy:
    name: Deploy → Dokploy
    if: github.event_name == 'push'
    needs: [docker]
    runs-on: ubuntu-latest

    steps:
      - name: Déclencher le redéploiement Dokploy
        run: |
          # Les webhooks de déploiement Dokploy se déclenchent en GET
          HTTP=$(curl -sS "${{ secrets.DOKPLOY_WEBHOOK_URL }}" -o response.txt -w "%{http_code}")
          echo "Code HTTP : $HTTP"
          echo "Réponse Dokploy : $(cat response.txt)"
          if [ "$HTTP" -ge 400 ]; then
            echo "::error::Webhook Dokploy a renvoyé $HTTP — vérifier le secret DOKPLOY_WEBHOOK_URL"
            exit 1
          fi
