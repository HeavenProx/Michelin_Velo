# Stack de production — Michelin Road Intelligence
#
# Usage sur le serveur :
#   1. Créer un fichier .env à côté de ce fichier (voir .env.prod.example)
#   2. Se connecter à ghcr.io :  echo $GHCR_TOKEN | docker login ghcr.io -u <user> --password-stdin
#   3. Lancer :  docker compose -f docker-compose.prod.yml up -d
#
# Mise à jour après un nouveau push (nouvelles images sur ghcr.io) :
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ghcr.io/heavenprox/michelin-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/michelin.db
    volumes:
      # Persiste la base SQLite hors du conteneur
      - backend-data:/app/data
    expose:
      - "3001"
    networks:
      - michelin

  frontend:
    image: ghcr.io/heavenprox/michelin-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Le serveur expose l'app sur le port 80 (ou un autre via .env)
      - "${HTTP_PORT:-80}:80"
    networks:
      - michelin

volumes:
  backend-data:

networks:
  michelin:
    driver: bridge
