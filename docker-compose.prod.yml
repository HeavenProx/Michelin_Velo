# Stack de production — Michelin Road Intelligence (déployée via Dokploy)
#
# Dokploy fournit Traefik (reverse-proxy + TLS Let's Encrypt) et le réseau
# partagé "dokploy-network". On n'expose donc aucun port : c'est Traefik qui
# route le domaine vers le conteneur frontend.
#
# Architecture :
#   Internet ──https──▶ Traefik ──▶ frontend (nginx:80)
#                                     ├── /        → React statique
#                                     └── /api,/auth → proxy interne ▶ backend:3001
#   backend reste sur le réseau "internal" : jamais exposé publiquement.
#
# Les variables d'environnement (Strava, SESSION_SECRET, etc.) se renseignent
# dans l'onglet "Environment" du service Dokploy (qui génère le .env).

services:
  mailpit:
    image: axllent/mailpit:latest
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal          # le backend y accède via smtp://mailpit:1025
      - dokploy-network   # pour exposer l'UI via Traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.mailpit.rule=Host(`${MAILPIT_HOST:-mail.ageronjoachim.com}`)
      - traefik.http.routers.mailpit.entrypoints=websecure
      - traefik.http.routers.mailpit.tls.certresolver=letsencrypt
      - traefik.http.services.mailpit.loadbalancer.server.port=8025

  backend:
    image: ghcr.io/heavenprox/michelin-backend:${IMAGE_TAG:-latest}
    # Re-télécharge l'image à chaque déploiement (sinon le :latest en cache
    # est réutilisé et les corrections ne sont jamais prises en compte)
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - mailpit
    env_file: .env
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/michelin.db
      # SMTP → Mailpit (peut être surchargé dans .env pour un vrai provider)
      EMAIL_HOST: mailpit
      EMAIL_PORT: "1025"
    volumes:
      # Persiste la base SQLite hors du conteneur
      - backend-data:/app/data
    networks:
      - internal

  frontend:
    image: ghcr.io/heavenprox/michelin-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal          # pour parler au backend via nginx proxy
      - dokploy-network    # pour être routé par Traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # Domaine public (HTTPS)
      - traefik.http.routers.michelin.rule=Host(`michelin.ageronjoachim.com`)
      - traefik.http.routers.michelin.entrypoints=websecure
      - traefik.http.routers.michelin.tls.certresolver=letsencrypt
      - traefik.http.services.michelin.loadbalancer.server.port=80

volumes:
  backend-data:

networks:
  internal:
  dokploy-network:
    external: true
